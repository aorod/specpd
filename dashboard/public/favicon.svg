<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>

  <!-- Top metric bar (linha horizontal fina) -->
  <rect x="4" y="5" width="24" height="2" rx="1" fill="#1e40af" opacity="0.6"/>

  <!-- Bar chart — 3 barras ascendentes da esquerda para direita -->
  <rect x="4"  y="22" width="6" height="5" rx="1.5" fill="#3b82f6"/>
  <rect x="13" y="14" width="6" height="13" rx="1.5" fill="#3b82f6"/>
  <rect x="22" y="9"  width="6" height="18" rx="1.5" fill="#60a5fa"/>

  <!-- Pontos de destaque no topo de cada barra -->
  <circle cx="7"  cy="20" r="1.8" fill="#93c5fd"/>
  <circle cx="16" cy="12" r="1.8" fill="#93c5fd"/>
  <circle cx="25" cy="7"  r="1.8" fill="#bfdbfe"/>
</svg>
