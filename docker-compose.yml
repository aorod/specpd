# Ambiente de DESENVOLVIMENTO — hot reload ativo em frontend e backend
# Pré-requisito: dashboard/server/.env preenchido com ADO_TOKEN

services:
  backend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && node index.js"
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./dashboard/server:/app
      - backend_modules:/app/node_modules   # evita conflito com node_modules do Windows
    env_file:
      - ./dashboard/server/.env
    environment:
      NODE_ENV: development

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./dashboard:/app
      - frontend_modules:/app/node_modules  # evita conflito com node_modules do Windows
    environment:
      BACKEND_URL: http://backend:3001      # proxy do Vite aponta pro service do compose
    depends_on:
      - backend

volumes:
  backend_modules:
  frontend_modules:
