# Ambiente de DESENVOLVIMENTO — hot reload ativo em frontend e backend
# Pré-requisito: dashboard/server/.env preenchido com ADO_TOKEN

services:
  backend:
    image: node:20-alpine
    working_dir: /app
    # Instala ferramentas de build necessárias para compilar better-sqlite3 (módulo nativo)
    command: >
      sh -c "apk add --no-cache python3 make g++ &&
             npm install &&
             node index.js"
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./dashboard/server:/app
      - backend_modules:/app/node_modules   # evita conflito com node_modules do Windows
    env_file:
      - ./dashboard/server/.env
    environment:
      NODE_ENV: development
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/cache/status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s   # tempo para npm install + compilação nativa
    networks:
      - app-network

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./dashboard:/app
      - frontend_modules:/app/node_modules  # evita conflito com node_modules do Windows
    environment:
      BACKEND_URL: http://backend:3001      # proxy do Vite aponta pro service do compose
    depends_on:
      backend:
        condition: service_healthy          # só sobe após backend responder
    networks:
      - app-network

volumes:
  backend_modules:
  frontend_modules:

networks:
  app-network:
    driver: bridge
